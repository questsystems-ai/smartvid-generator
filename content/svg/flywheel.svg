<circle cx="148" cy="217" r="52" fill="#1a0202" stroke="#ff5555" stroke-width="2"/>
<text x="148" y="205" text-anchor="middle" font-size="20">📣</text>
<text x="148" y="222" text-anchor="middle" font-family="'Courier New',monospace" font-size="8.5" fill="#ff5555" font-weight="bold">MARKETING</text>
