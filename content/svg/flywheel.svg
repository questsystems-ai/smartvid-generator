<!-- Title -->
<text x="310" y="30" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#555" letter-spacing="2">THE FLYWHEEL</text>

<!-- Arcs between nodes (on circle r=170, center 310,270) -->
<!-- 0(top,310,100) → 1(top-right,472,217) -->
<path d="M 320,107 A 170,170 0 0 1 462,223" fill="none" stroke="#4da6ff" stroke-width="1.8" stroke-dasharray="6,3" opacity="0.6" marker-end="url(#a0)"/>
<!-- 1(472,217) → 2(bot-right,410,408) -->
<path d="M 474,233 A 170,170 0 0 1 406,398" fill="none" stroke="#bb88ff" stroke-width="1.8" stroke-dasharray="6,3" opacity="0.6" marker-end="url(#a1)"/>
