<path d="M 209,395 A 170,170 0 0 1 148,233" fill="none" stroke="#ff9944" stroke-width="1.8" stroke-dasharray="6,3" opacity="0.6" marker-end="url(#a3)"/>
<!-- 4(148,217) → 0(310,100) -->
<path d="M 158,223 A 170,170 0 0 1 300,107" fill="none" stroke="#ff5555" stroke-width="1.8" stroke-dasharray="6,3" opacity="0.6" marker-end="url(#a4)"/>

<!-- Center hub -->
<circle cx="310" cy="270" r="58" fill="#0d1117" stroke="#7c6ff7" stroke-width="1.5"/>
<text x="310" y="264" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#7c6ff7" letter-spacing="2" font-weight="bold">EACH PROJECT</text>
<text x="310" y="277" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#7c6ff7" letter-spacing="2">IS A DOOR.</text>
<text x="310" y="290" text-anchor="middle" font-family="'Courier New',monospace" font-size="8" fill="rgba(124,111,247,0.5)" letter-spacing="1">EVERY DOOR</text>
<text x="310" y="302" text-anchor="middle" font-family="'Courier New',monospace" font-size="8" fill="rgba(124,111,247,0.5)" letter-spacing="1">LEADS TO THE OTHERS.</text>

