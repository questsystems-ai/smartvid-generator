<svg xmlns="http://www.w3.org/2000/svg" viewBox="-170 0 960 520">
<defs>
  <marker id="a0" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#4da6ff" opacity="0.7"/></marker>
  <marker id="a1" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#bb88ff" opacity="0.7"/></marker>
  <marker id="a2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#44dd88" opacity="0.7"/></marker>
